name: GPU Smoke Test (Self-Hosted)

on:
  # SECURITY: Only trigger on direct pushes and manual dispatch.
  # Never run on pull_request — fork PRs could execute arbitrary code
  # on the self-hosted runner with GPU access.
  push:
    branches: [main, 'sid/**']
    paths:
      - 'cmux-linux/**'
      - 'ghostty'
      - '.github/workflows/test-gpu.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or SHA to test
        required: false
        default: ""
      test_timeout:
        description: "Smoke test timeout in seconds"
        required: false
        default: "15"

concurrency:
  group: test-gpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gpu-smoke:
    name: GPU smoke test (honey)
    runs-on: [self-hosted, linux, gpu, cmux-test]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: GPU info
        run: |
          echo "=== GPU devices ==="
          ls -la /dev/dri/ || echo "No DRI devices"

          echo "=== OpenGL info ==="
          if [ -n "${DISPLAY:-}" ]; then
            glxinfo 2>/dev/null | grep -E "OpenGL (version|renderer)|direct rendering" || true
          else
            Xvfb :97 -screen 0 1280x720x24 &
            XVFB_PID=$!
            sleep 1
            DISPLAY=:97 glxinfo 2>/dev/null | grep -E "OpenGL (version|renderer)|direct rendering" || true
            kill $XVFB_PID 2>/dev/null || true
          fi

          echo "=== Vulkan info ==="
          vulkaninfo --summary 2>/dev/null | head -20 || echo "vulkaninfo not available"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: false

      - name: Build libghostty
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Drenderer=opengl -Doptimize=ReleaseFast
          echo "libghostty.so: $(ls -lh zig-out/lib/libghostty.* 2>/dev/null || echo 'not found')"

      - name: Build cmux-linux
        run: |
          cd cmux-linux
          zig build -Doptimize=ReleaseFast
          echo "cmux: $(ls -lh zig-out/bin/cmux)"

      - name: Test cmux-linux (config parser)
        run: |
          cd cmux-linux
          zig build test

      - name: GPU smoke test
        run: |
          BINARY="cmux-linux/zig-out/bin/cmux"
          export LD_LIBRARY_PATH="$PWD/ghostty/zig-out/lib:${LD_LIBRARY_PATH:-}"

          # Set up virtual display with GPU DRI access via GLX
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 +extension GLX &
          XVFB_PID=$!
          sleep 1

          # Set up XDG runtime
          export XDG_RUNTIME_DIR=/tmp/xdg-runtime-gpu-test
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"

          echo "=== OpenGL context check ==="
          glxinfo 2>/dev/null | grep -E "OpenGL (version|renderer)|direct rendering" || echo "glxinfo not available"

          TIMEOUT="${{ inputs.test_timeout || '15' }}"
          echo "=== Starting cmux-linux (timeout ${TIMEOUT}s) ==="
          timeout "$TIMEOUT" "$BINARY" 2>/tmp/cmux-gpu-stderr.log &
          BINARY_PID=$!

          # Wait for socket creation (up to 5 seconds)
          SOCKET_FOUND=false
          for i in $(seq 1 10); do
            if [ -S "$XDG_RUNTIME_DIR/cmux.sock" ]; then
              SOCKET_FOUND=true
              echo "Socket created after ${i}x0.5s"
              break
            fi
            sleep 0.5
          done

          if [ "$SOCKET_FOUND" = true ]; then
            echo "=== Socket permissions ==="
            ls -la "$XDG_RUNTIME_DIR/cmux.sock"

            echo "=== JSON-RPC ping ==="
            RESPONSE=$(echo '{"id":1,"method":"system.ping","params":{}}' | \
              socat -t2 - UNIX-CONNECT:"$XDG_RUNTIME_DIR/cmux.sock" 2>/dev/null || true)
            echo "Response: $RESPONSE"
            if echo "$RESPONSE" | grep -q "pong"; then
              echo "Socket ping: PASS"
            else
              echo "Socket ping: FAIL (response: $RESPONSE)"
            fi

            echo "=== JSON-RPC workspace.list ==="
            RESPONSE=$(echo '{"id":2,"method":"workspace.list","params":{}}' | \
              socat -t2 - UNIX-CONNECT:"$XDG_RUNTIME_DIR/cmux.sock" 2>/dev/null || true)
            echo "Response: $RESPONSE"

            echo "=== JSON-RPC system.identify ==="
            RESPONSE=$(echo '{"id":3,"method":"system.identify","params":{}}' | \
              socat -t2 - UNIX-CONNECT:"$XDG_RUNTIME_DIR/cmux.sock" 2>/dev/null || true)
            echo "Response: $RESPONSE"
          else
            echo "Socket not created within 5s"

            # Check if process is still alive
            if kill -0 $BINARY_PID 2>/dev/null; then
              echo "Process is running but socket not created"
            else
              echo "Process already exited"
            fi
          fi

          echo "=== Clean shutdown ==="
          if kill -0 $BINARY_PID 2>/dev/null; then
            kill -TERM $BINARY_PID 2>/dev/null || true
            for i in $(seq 1 6); do
              kill -0 $BINARY_PID 2>/dev/null || break
              sleep 0.5
            done
            if kill -0 $BINARY_PID 2>/dev/null; then
              echo "WARN: Process did not exit on SIGTERM, sending SIGKILL"
              kill -9 $BINARY_PID 2>/dev/null || true
            else
              echo "Clean shutdown: PASS"
            fi
          else
            echo "Process already exited before shutdown"
          fi

          echo "=== Binary stderr ==="
          cat /tmp/cmux-gpu-stderr.log || true

          # Check for core dump
          if ls /tmp/core.* 2>/dev/null || ls core.* 2>/dev/null; then
            echo "=== Core dump found — running GDB backtrace ==="
            CORE=$(ls -t /tmp/core.* core.* 2>/dev/null | head -1)
            gdb -batch -ex "thread apply all bt" -ex quit "$BINARY" "$CORE" 2>/dev/null || true
          fi

          # Cleanup
          kill -9 $XVFB_PID 2>/dev/null || true
          rm -rf "$XDG_RUNTIME_DIR"

          echo "=== GPU smoke test completed ==="

      - name: Upload crash logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-crash-logs
          path: |
            /tmp/cmux-gpu-stderr.log
            /tmp/core.*
          retention-days: 7
