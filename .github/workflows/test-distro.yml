name: Distro Package Tests (Self-Hosted)

on:
  # SECURITY: Only trigger on direct pushes and manual dispatch.
  # Never run on pull_request — fork PRs could execute arbitrary code
  # on the self-hosted runner with KVM access.
  push:
    branches: [main, 'sid/**']
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/**'
      - 'dist/**'
      - 'cmux-linux/**'
      - 'ghostty'
      - '.github/workflows/test-distro.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or SHA to test
        required: false
        default: ""
      distro:
        description: "Distro to test (rocky10 requires a release tag with a dedicated Rocky terminal-first RPM asset)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - fedora42
          - rocky10
          - rocky9
          - debian12
          - ubuntu2404
      release_tag:
        description: "Optional GitHub release tag to validate instead of the checked-in manifest (e.g. lab-v0.75.0)"
        required: false
        default: ""

concurrency:
  group: test-distro-${{ github.ref }}
  cancel-in-progress: true

jobs:
  distro-tests:
    name: Distro package tests (self-hosted KVM)
    runs-on: [self-hosted, linux, kvm, cmux-distro-test]
    environment: distro-tests
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Strip non-version tags from ghostty
        run: git -C ghostty tag -l 'xcframework-*' | xargs git -C ghostty tag -d 2>/dev/null || true

      - name: Generate release artifact override manifest
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "$TMPDIR"' EXIT

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'cmux_*.deb' \
            --pattern 'cmux-*.rpm' \
            --dir "$TMPDIR"

          mapfile -t DEB_PATHS < <(find "$TMPDIR" -maxdepth 1 -name 'cmux_*.deb' | sort)
          mapfile -t FEDORA_RPM_PATHS < <(find "$TMPDIR" -maxdepth 1 -name 'cmux-*.fc42.x86_64.rpm' | sort)
          mapfile -t ROCKY_RPM_PATHS < <(find "$TMPDIR" -maxdepth 1 -name 'cmux-*.el10*.x86_64.rpm' | sort)

          if [ "${#DEB_PATHS[@]}" -ne 1 ]; then
            echo "ERROR: expected exactly one DEB asset for $TAG, found ${#DEB_PATHS[@]}"
            printf '%s\n' "${DEB_PATHS[@]}"
            exit 1
          fi

          if [ "${#FEDORA_RPM_PATHS[@]}" -ne 1 ]; then
            echo "ERROR: expected exactly one Fedora x86_64 RPM asset for $TAG, found ${#FEDORA_RPM_PATHS[@]}"
            printf '%s\n' "${FEDORA_RPM_PATHS[@]}"
            exit 1
          fi

          DEB_PATH="${DEB_PATHS[0]}"
          FEDORA_RPM_PATH="${FEDORA_RPM_PATHS[0]}"

          DEB_NAME="$(basename "$DEB_PATH")"
          FEDORA_RPM_NAME="$(basename "$FEDORA_RPM_PATH")"
          DEB_HASH="$(nix hash file --type sha256 --sri "$DEB_PATH")"
          FEDORA_RPM_HASH="$(nix hash file --type sha256 --sri "$FEDORA_RPM_PATH")"

          cat > nix/release-artifacts.override.nix <<EOF
          {
            releaseTag = "${TAG}";
            assets = {
              deb = {
                name = "${DEB_NAME}";
                hash = "${DEB_HASH}";
              };
              rpm = {
                name = "${FEDORA_RPM_NAME}";
                hash = "${FEDORA_RPM_HASH}";
              };
              rpmFedora = {
                name = "${FEDORA_RPM_NAME}";
                hash = "${FEDORA_RPM_HASH}";
              };
          EOF

          if [ "${#ROCKY_RPM_PATHS[@]}" -eq 1 ]; then
            ROCKY_RPM_PATH="${ROCKY_RPM_PATHS[0]}"
            ROCKY_RPM_NAME="$(basename "$ROCKY_RPM_PATH")"
            ROCKY_RPM_HASH="$(nix hash file --type sha256 --sri "$ROCKY_RPM_PATH")"
            cat >> nix/release-artifacts.override.nix <<EOF
              rpmRocky = {
                name = "${ROCKY_RPM_NAME}";
                hash = "${ROCKY_RPM_HASH}";
              };
            EOF
          fi

          cat >> nix/release-artifacts.override.nix <<EOF
            };
          }
          EOF

          echo "Generated nix/release-artifacts.override.nix for ${TAG}"
          cat nix/release-artifacts.override.nix

      - name: Configure self-hosted Nix
        run: bash scripts/configure-self-hosted-nix.sh

      - name: Verify runner Nix daemon
        run: |
          nix --version
          nix store info --store daemon

      - name: Verify KVM access
        run: |
          echo "=== KVM device ==="
          ls -la /dev/kvm
          test -c /dev/kvm || { echo "ERROR: /dev/kvm not found"; exit 1; }
          test -r /dev/kvm || { echo "ERROR: /dev/kvm not readable"; exit 1; }
          echo "=== QEMU version ==="
          # Rocky 10+ only ships /usr/libexec/qemu-kvm (no qemu-system-x86_64 in PATH)
          if command -v qemu-system-x86_64 &>/dev/null; then
            qemu-system-x86_64 --version | head -1
          elif [ -x /usr/libexec/qemu-kvm ]; then
            /usr/libexec/qemu-kvm --version | head -1
          else
            echo "WARNING: no QEMU binary found in PATH (Nix provides it at build time)"
          fi

      - name: Rocky 9 package test (RPM proxy)
        if: inputs.distro == 'all' || inputs.distro == 'rocky9' || inputs.distro == ''
        run: nix --store daemon build .#checks.x86_64-linux.distro-rocky9 --print-build-logs -L --option sandbox relaxed

      - name: Fedora 42 package test
        if: inputs.distro == 'all' || inputs.distro == 'fedora42' || inputs.distro == ''
        run: nix --store daemon build .#checks.x86_64-linux.distro-fedora42 --print-build-logs -L --option sandbox relaxed

      - name: Rocky 10 package test
        if: inputs.distro == 'rocky10'
        run: nix --store daemon build .#checks.x86_64-linux.distro-rocky10 --print-build-logs -L --option sandbox relaxed


      - name: Debian 12 package test
        if: inputs.distro == 'all' || inputs.distro == 'debian12' || inputs.distro == ''
        run: nix --store daemon build .#checks.x86_64-linux.distro-debian12 --print-build-logs -L --option sandbox relaxed

      - name: Ubuntu 24.04 package test
        if: inputs.distro == 'all' || inputs.distro == 'ubuntu2404' || inputs.distro == ''
        run: nix --store daemon build .#checks.x86_64-linux.distro-ubuntu2404 --print-build-logs -L --option sandbox relaxed

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: distro-test-logs-${{ github.run_id }}
          path: |
            result/
            /tmp/distro-tests-*
          retention-days: 7
          if-no-files-found: ignore
