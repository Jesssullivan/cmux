name: CJK Input Tests (Self-Hosted)

on:
  # SECURITY: Only trigger on direct pushes and manual dispatch.
  # Never run on pull_request — fork PRs could execute arbitrary code
  # on the self-hosted runner.
  push:
    branches: [main, 'sid/**']
    paths:
      - 'cmux-linux/**'
      - 'ghostty'
      - 'scripts/test-cjk-input.sh'
      - '.github/workflows/test-cjk.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or SHA to test
        required: false
        default: ""

concurrency:
  group: test-cjk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cjk-input:
    name: CJK input validation (honey)
    runs-on: [self-hosted, linux, gpu, cmux-test]
    environment: gpu-tests
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Strip non-version tags from ghostty
        run: git -C ghostty tag -l 'xcframework-*' | xargs git -C ghostty tag -d 2>/dev/null || true

      - name: Install CJK IME frameworks
        run: |
          # fcitx5 with CJK input methods + GTK4 module
          sudo dnf install -y \
            fcitx5 fcitx5-gtk4 \
            fcitx5-anthy fcitx5-chinese-addons fcitx5-hangul \
            xorg-x11-server-Xvfb xdotool socat mesa-dri-drivers \
            2>/dev/null || \
          sudo apt-get install -y \
            fcitx5 fcitx5-module-fcitx4 \
            fcitx5-anthy fcitx5-chinese-addons fcitx5-hangul \
            xvfb xdotool socat mesa-utils \
            2>/dev/null || \
          echo "Package install skipped (may already be present)"

      - name: Build libghostty (Nix)
        run: |
          nix develop --command bash -c 'cd ghostty && zig build -Dapp-runtime=none -Drenderer=opengl -Doptimize=ReleaseFast'
          bash scripts/ghostty-compat-symlinks.sh
          ls -lh ghostty/zig-out/lib/libghostty.*

      - name: Build cmux-linux (Nix)
        run: nix develop --command bash -c 'cd cmux-linux && zig build -Doptimize=ReleaseFast && ls -lh zig-out/bin/cmux'

      - name: Run CJK input tests
        run: nix develop --command bash scripts/test-cjk-input.sh

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cjk-test-logs
          path: /tmp/cmux-cjk-stderr.log
          retention-days: 7
