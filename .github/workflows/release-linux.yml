name: Linux Release

on:
  push:
    tags:
      - 'lab-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. lab-v0.73.0)'
        required: true

concurrency:
  group: release-linux
  cancel-in-progress: false

jobs:
  # ── Build + package on Ubuntu (DEB + tarball) ─────────────────────
  build-deb:
    name: Build DEB package (Ubuntu, ${{ matrix.arch.deb }})
    runs-on: ${{ matrix.arch.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { deb: amd64, tar: amd64, runner: ubuntu-latest }
          - { deb: arm64, tar: arm64, runner: ubuntu-24.04-arm }
    outputs:
      # Both matrix legs compute the same value, so this is safe — GHA
      # picks an arbitrary leg's value, and downstream jobs only care that
      # tag/version match the triggering ref.
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Strip non-version tags from ghostty
        run: git -C ghostty tag -l 'xcframework-*' | xargs git -C ghostty tag -d 2>/dev/null || true

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#lab-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Linux packages for $TAG (version $VERSION)"

      - name: Install Zig
        run: bash ./scripts/install-zig-ci.sh 0.15.2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsecret-1-dev libnotify-dev pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libwebkitgtk-6.0-dev \
            libfreetype-dev libharfbuzz-dev libfontconfig-dev \
            libpng-dev libonig-dev libgl-dev \
            glslang-tools spirv-cross patchelf

      - name: Build vendor libraries
        run: |
          cd vendor/ctap2 && zig build -Dcpu=baseline -Doptimize=ReleaseFast && cd ../..
          cd vendor/zig-crypto && zig build -Dcpu=baseline -Doptimize=ReleaseFast && cd ../..
          cd vendor/zig-keychain && zig build -Dcpu=baseline -Doptimize=ReleaseFast && cd ../..
          cd vendor/zig-notify && zig build -Dcpu=baseline -Doptimize=ReleaseFast && cd ../..

      - name: Build libghostty
        run: |
          bash scripts/retry-zig-build.sh \
            --label "libghostty" \
            --working-directory ghostty \
            -- zig build -Dcpu=baseline -Dapp-runtime=none -Drenderer=opengl -Doptimize=ReleaseFast
          bash scripts/ghostty-compat-symlinks.sh

      - name: Build cmux-linux
        run: |
          cd cmux-linux
          zig build -Dcpu=baseline -Doptimize=ReleaseFast -Dversion="${{ steps.version.outputs.version }}"

      - name: Build cmuxd
        run: |
          if [ -d cmuxd ]; then
            cd cmuxd && zig build -Dcpu=baseline -Doptimize=ReleaseFast
          fi

      - name: Assemble DEB package
        env:
          DEB_ARCH: ${{ matrix.arch.deb }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG="cmux_${VERSION}_${DEB_ARCH}"
          mkdir -p "${PKG}/DEBIAN"

          cat > "${PKG}/DEBIAN/control" <<CTRL
          Package: cmux
          Version: ${VERSION}
          Architecture: ${DEB_ARCH}
          Maintainer: Jess Sullivan <jess@jesssullivan.dev>
          Homepage: https://github.com/Jesssullivan/cmux
          Section: x11
          Priority: optional
          Depends: libgtk-4-1 (>= 4.10), libadwaita-1-0 (>= 1.3), libwebkitgtk-6.0-4
          Description: Terminal multiplexer with split panes and workspaces
           cmux is a GTK4 terminal multiplexer built on libghostty.
          CTRL

          # Strip leading whitespace from control file (heredoc indentation)
          sed -i 's/^          //' "${PKG}/DEBIAN/control"

          cat > "${PKG}/DEBIAN/postinst" <<'POSTINST'
          #!/bin/sh
          set -e
          gtk-update-icon-cache /usr/share/icons/hicolor 2>/dev/null || true
          udevadm control --reload-rules 2>/dev/null || true
          udevadm trigger --subsystem-match=hidraw 2>/dev/null || true
          POSTINST
          sed -i 's/^          //' "${PKG}/DEBIAN/postinst"
          chmod 755 "${PKG}/DEBIAN/postinst"

          # Binary + shared library
          install -Dm755 cmux-linux/zig-out/bin/cmux "${PKG}/usr/bin/cmux"
          install -Dm755 ghostty/zig-out/lib/libghostty.so "${PKG}/usr/lib/cmux/libghostty.so"
          bash scripts/set-linux-package-rpath.sh "${PKG}/usr/bin/cmux" "/usr/lib/cmux"

          # cmuxd
          if [ -f cmuxd/zig-out/bin/cmuxd ]; then
            install -Dm755 cmuxd/zig-out/bin/cmuxd "${PKG}/usr/bin/cmuxd"
          fi

          # Desktop, metainfo, icons
          install -Dm644 dist/linux/com.jesssullivan.cmux.desktop \
            "${PKG}/usr/share/applications/com.jesssullivan.cmux.desktop"
          install -Dm644 dist/linux/com.jesssullivan.cmux.metainfo.xml \
            "${PKG}/usr/share/metainfo/com.jesssullivan.cmux.metainfo.xml"
          for size in 16 128 256 512; do
            install -Dm644 "dist/linux/icons/com.jesssullivan.cmux_${size}x${size}.png" \
              "${PKG}/usr/share/icons/hicolor/${size}x${size}/apps/com.jesssullivan.cmux.png"
          done

          # udev rules for FIDO2/U2F hardware keys
          install -Dm644 dist/linux/70-u2f.rules "${PKG}/usr/lib/udev/rules.d/70-u2f.rules"

          dpkg-deb --build "${PKG}"
          echo "Built: ${PKG}.deb ($(du -h "${PKG}.deb" | cut -f1))"

      - name: Assemble generic tarball
        env:
          TAR_ARCH: ${{ matrix.arch.tar }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="cmux-${VERSION}-linux-${TAR_ARCH}"
          mkdir -p "${STAGING}"/{bin,lib/cmux,share/{applications,metainfo,icons/hicolor/{16x16,128x128,256x256,512x512}/apps},lib/udev/rules.d}

          cp cmux-linux/zig-out/bin/cmux "${STAGING}/bin/"
          cp ghostty/zig-out/lib/libghostty.so "${STAGING}/lib/cmux/"
          bash scripts/set-linux-package-rpath.sh "${STAGING}/bin/cmux" '$ORIGIN/../lib/cmux'
          if [ -f cmuxd/zig-out/bin/cmuxd ]; then
            cp cmuxd/zig-out/bin/cmuxd "${STAGING}/bin/"
          fi
          cp dist/linux/com.jesssullivan.cmux.desktop "${STAGING}/share/applications/"
          cp dist/linux/com.jesssullivan.cmux.metainfo.xml "${STAGING}/share/metainfo/"
          for size in 16 128 256 512; do
            cp "dist/linux/icons/com.jesssullivan.cmux_${size}x${size}.png" \
              "${STAGING}/share/icons/hicolor/${size}x${size}/apps/com.jesssullivan.cmux.png"
          done
          cp dist/linux/70-u2f.rules "${STAGING}/lib/udev/rules.d/"

          cat > "${STAGING}/install.sh" <<'INSTALL'
          #!/bin/sh
          set -e
          PREFIX="${1:-/usr/local}"
          install -Dm755 bin/cmux "$PREFIX/bin/cmux"
          install -Dm755 lib/cmux/libghostty.so "$PREFIX/lib/cmux/libghostty.so"
          [ -f bin/cmuxd ] && install -Dm755 bin/cmuxd "$PREFIX/bin/cmuxd"
          install -Dm644 share/applications/com.jesssullivan.cmux.desktop "$PREFIX/share/applications/com.jesssullivan.cmux.desktop"
          install -Dm644 share/metainfo/com.jesssullivan.cmux.metainfo.xml "$PREFIX/share/metainfo/com.jesssullivan.cmux.metainfo.xml"
          for size in 16 128 256 512; do
            install -Dm644 "share/icons/hicolor/${size}x${size}/apps/com.jesssullivan.cmux.png" \
              "$PREFIX/share/icons/hicolor/${size}x${size}/apps/com.jesssullivan.cmux.png"
          done
          install -Dm644 lib/udev/rules.d/70-u2f.rules /usr/lib/udev/rules.d/70-u2f.rules
          echo "Installed cmux to $PREFIX"
          INSTALL
          chmod +x "${STAGING}/install.sh"

          tar czf "cmux-${VERSION}-linux-${TAR_ARCH}.tar.gz" "${STAGING}"
          echo "Built: cmux-${VERSION}-linux-${TAR_ARCH}.tar.gz ($(du -h "cmux-${VERSION}-linux-${TAR_ARCH}.tar.gz" | cut -f1))"

      - name: Sign DEB and tarball with GPG
        env:
          REQUIRE_LINUX_GPG: "1"
          LINUX_GPG_PRIVATE_KEY_BASE64: ${{ secrets.LINUX_GPG_PRIVATE_KEY_BASE64 }}
          LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
          LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
        run: |
          bash scripts/sign-linux-packages.sh
          bash scripts/assert-linux-package-signatures.sh

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmux-linux-deb-${{ matrix.arch.deb }}
          path: |
            cmux_*_${{ matrix.arch.deb }}.deb
            cmux_*_${{ matrix.arch.deb }}.deb.asc
          if-no-files-found: error

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmux-linux-tarball-${{ matrix.arch.tar }}
          path: |
            cmux-*-linux-${{ matrix.arch.tar }}.tar.gz
            cmux-*-linux-${{ matrix.arch.tar }}.tar.gz.asc
          if-no-files-found: error

  # ── Build + package on Fedora (RPM) ──────────────────────────────
  build-rpm:
    name: Build RPM package (Fedora 42, ${{ matrix.arch.rpm }})
    runs-on: ${{ matrix.arch.runner }}
    container: fedora:42
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { rpm: x86_64, runner: ubuntu-latest }
          - { rpm: aarch64, runner: ubuntu-24.04-arm }
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            git rpm-build rpm-sign gnupg2 systemd-rpm-macros \
            gcc gcc-c++ pkg-config \
            gtk4-devel libadwaita-devel \
            webkitgtk6.0-devel \
            libsecret-devel libnotify-devel \
            wayland-devel wayland-protocols-devel \
            freetype-devel harfbuzz-devel fontconfig-devel \
            libpng-devel oniguruma-devel mesa-libGL-devel \
            patchelf

      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Strip non-version tags from ghostty
        run: git -C ghostty tag -l 'xcframework-*' | xargs git -C ghostty tag -d 2>/dev/null || true

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#lab-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Zig
        run: bash ./scripts/install-zig-ci.sh 0.15.2

      - name: Build vendor libraries
        run: |
          cd vendor/ctap2 && zig build -Dcpu=baseline -Doptimize=ReleaseFast && cd ../..
          cd vendor/zig-crypto && zig build -Dcpu=baseline -Doptimize=ReleaseFast && cd ../..
          cd vendor/zig-keychain && zig build -Dcpu=baseline -Doptimize=ReleaseFast && cd ../..
          cd vendor/zig-notify && zig build -Dcpu=baseline -Doptimize=ReleaseFast && cd ../..

      - name: Build libghostty
        run: |
          bash scripts/retry-zig-build.sh \
            --label "libghostty" \
            --working-directory ghostty \
            -- zig build -Dcpu=baseline -Dapp-runtime=none -Drenderer=opengl -Doptimize=ReleaseFast
          bash scripts/ghostty-compat-symlinks.sh

      - name: Build cmux-linux
        run: |
          cd cmux-linux
          zig build -Dcpu=baseline -Doptimize=ReleaseFast -Dversion="${{ steps.version.outputs.version }}"

      - name: Build cmuxd
        run: |
          if [ -d cmuxd ]; then
            cd cmuxd && zig build -Dcpu=baseline -Doptimize=ReleaseFast
          fi

      - name: Assemble RPM package
        env:
          RPM_ARCH: ${{ matrix.arch.rpm }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # RPM Version field cannot contain hyphens; use tilde for pre-release
          RPM_VERSION=$(echo "$VERSION" | tr '-' '~')
          TOPDIR="$PWD/rpmbuild"
          mkdir -p "$TOPDIR"/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT}
          BUILDROOT="$TOPDIR/BUILDROOT/cmux-${RPM_VERSION}-1.${RPM_ARCH}"

          # Resolve RPM macros for this distro
          UDEVRULESDIR=$(rpm --eval '%{_udevrulesdir}')
          LIBDIR=$(rpm --eval '%{_libdir}')

          # Install files into buildroot (must match %files in spec)
          install -Dm755 cmux-linux/zig-out/bin/cmux "${BUILDROOT}/usr/bin/cmux"
          install -Dm755 ghostty/zig-out/lib/libghostty.so "${BUILDROOT}${LIBDIR}/cmux/libghostty.so"
          bash scripts/set-linux-package-rpath.sh "${BUILDROOT}/usr/bin/cmux" "${LIBDIR}/cmux"
          if [ -f cmuxd/zig-out/bin/cmuxd ]; then
            install -Dm755 cmuxd/zig-out/bin/cmuxd "${BUILDROOT}/usr/bin/cmuxd"
          fi
          install -Dm644 dist/linux/com.jesssullivan.cmux.desktop "${BUILDROOT}/usr/share/applications/com.jesssullivan.cmux.desktop"
          install -Dm644 dist/linux/com.jesssullivan.cmux.metainfo.xml "${BUILDROOT}/usr/share/metainfo/com.jesssullivan.cmux.metainfo.xml"
          for size in 16 128 256 512; do
            install -Dm644 "dist/linux/icons/com.jesssullivan.cmux_${size}x${size}.png" \
              "${BUILDROOT}/usr/share/icons/hicolor/${size}x${size}/apps/com.jesssullivan.cmux.png"
          done
          install -Dm644 dist/linux/70-u2f.rules "${BUILDROOT}${UDEVRULESDIR}/70-u2f.rules"
          # %license and %doc files expected by the spec
          install -Dm644 LICENSE "${BUILDROOT}/usr/share/licenses/cmux/LICENSE"
          install -Dm644 README.md "${BUILDROOT}/usr/share/doc/cmux/README.md"

          PAYLOAD="$TOPDIR/SOURCES/payload"
          mkdir -p "$PAYLOAD"
          cp -a "$BUILDROOT"/. "$PAYLOAD"/

          # Generate spec from template with correct version
          sed "s/^Version:.*/Version:        ${RPM_VERSION}/" dist/cmux.spec > "$TOPDIR/SPECS/cmux.spec"

          # Build binary RPM from prebuilt payload without --short-circuit
          rpmbuild -bb \
            --define "_topdir $TOPDIR" \
            --define "_builddir $PWD" \
            --nodeps \
            --with prebuilt \
            "$TOPDIR/SPECS/cmux.spec"

          RPM=$(find "$TOPDIR/RPMS" -name '*.rpm' | head -1)
          cp "$RPM" .
          RPM_NAME=$(basename "$RPM")
          echo "Built: $RPM_NAME ($(du -h "$RPM_NAME" | cut -f1))"

      - name: Sign RPM with GPG
        env:
          REQUIRE_LINUX_GPG: "1"
          LINUX_GPG_PRIVATE_KEY_BASE64: ${{ secrets.LINUX_GPG_PRIVATE_KEY_BASE64 }}
          LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
          LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
        run: |
          bash scripts/sign-linux-packages.sh
          bash scripts/assert-linux-package-signatures.sh

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmux-linux-rpm-fedora-${{ matrix.arch.rpm }}
          path: |
            cmux-*.${{ matrix.arch.rpm }}.rpm
            cmux-*.${{ matrix.arch.rpm }}.rpm.asc
          if-no-files-found: error

  # ── Build + package on Rocky (terminal-first RPM) ────────────────
  build-rpm-rocky:
    name: Build RPM package (Rocky 10, ${{ matrix.arch.rpm }})
    runs-on: ${{ matrix.arch.runner }}
    container: rockylinux/rockylinux:10
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { rpm: x86_64, runner: ubuntu-latest }
          - { rpm: aarch64, runner: ubuntu-24.04-arm }
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y dnf-plugins-core epel-release
          dnf config-manager --set-enabled crb
          dnf install -y \
            git rpm-build rpm-sign gnupg2 systemd-rpm-macros \
            gcc gcc-c++ pkg-config \
            gtk4-devel libadwaita-devel \
            libsecret-devel libnotify-devel \
            wayland-devel wayland-protocols-devel \
            freetype-devel harfbuzz-devel fontconfig-devel \
            libpng-devel oniguruma-devel mesa-libGL-devel \
            glslang \
            patchelf

      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Strip non-version tags from ghostty
        run: git -C ghostty tag -l 'xcframework-*' | xargs git -C ghostty tag -d 2>/dev/null || true

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#lab-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Zig
        run: bash ./scripts/install-zig-ci.sh 0.15.2

      - name: Build vendor libraries
        run: |
          cd vendor/ctap2 && zig build -Dcpu=baseline -Doptimize=ReleaseFast && cd ../..
          cd vendor/zig-crypto && zig build -Dcpu=baseline -Doptimize=ReleaseFast && cd ../..
          cd vendor/zig-keychain && zig build -Dcpu=baseline -Doptimize=ReleaseFast && cd ../..
          cd vendor/zig-notify && zig build -Dcpu=baseline -Doptimize=ReleaseFast && cd ../..

      - name: Build libghostty
        run: |
          bash scripts/retry-zig-build.sh \
            --label "libghostty" \
            --working-directory ghostty \
            -- zig build -Dcpu=baseline -Dapp-runtime=none -Drenderer=opengl -Doptimize=ReleaseFast
          bash scripts/ghostty-compat-symlinks.sh

      - name: Build cmux-linux (terminal-first)
        run: |
          cd cmux-linux
          zig build -Dcpu=baseline -Doptimize=ReleaseFast -Dno-webkit=true -Dversion="${{ steps.version.outputs.version }}"

      - name: Build cmuxd
        run: |
          if [ -d cmuxd ]; then
            cd cmuxd && zig build -Dcpu=baseline -Doptimize=ReleaseFast
          fi

      - name: Assemble RPM package
        env:
          RPM_ARCH: ${{ matrix.arch.rpm }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RPM_VERSION=$(echo "$VERSION" | tr '-' '~')
          TOPDIR="$PWD/rpmbuild"
          mkdir -p "$TOPDIR"/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT}
          BUILDROOT="$TOPDIR/BUILDROOT/cmux-${RPM_VERSION}-1.${RPM_ARCH}"

          UDEVRULESDIR=$(rpm --eval '%{_udevrulesdir}')
          LIBDIR=$(rpm --eval '%{_libdir}')

          install -Dm755 cmux-linux/zig-out/bin/cmux "${BUILDROOT}/usr/bin/cmux"
          install -Dm755 ghostty/zig-out/lib/libghostty.so "${BUILDROOT}${LIBDIR}/cmux/libghostty.so"
          bash scripts/set-linux-package-rpath.sh "${BUILDROOT}/usr/bin/cmux" "${LIBDIR}/cmux"
          if [ -f cmuxd/zig-out/bin/cmuxd ]; then
            install -Dm755 cmuxd/zig-out/bin/cmuxd "${BUILDROOT}/usr/bin/cmuxd"
          fi
          install -Dm644 dist/linux/com.jesssullivan.cmux.desktop "${BUILDROOT}/usr/share/applications/com.jesssullivan.cmux.desktop"
          install -Dm644 dist/linux/com.jesssullivan.cmux.metainfo.xml "${BUILDROOT}/usr/share/metainfo/com.jesssullivan.cmux.metainfo.xml"
          for size in 16 128 256 512; do
            install -Dm644 "dist/linux/icons/com.jesssullivan.cmux_${size}x${size}.png" \
              "${BUILDROOT}/usr/share/icons/hicolor/${size}x${size}/apps/com.jesssullivan.cmux.png"
          done
          install -Dm644 dist/linux/70-u2f.rules "${BUILDROOT}${UDEVRULESDIR}/70-u2f.rules"
          install -Dm644 LICENSE "${BUILDROOT}/usr/share/licenses/cmux/LICENSE"
          install -Dm644 README.md "${BUILDROOT}/usr/share/doc/cmux/README.md"

          PAYLOAD="$TOPDIR/SOURCES/payload"
          mkdir -p "$PAYLOAD"
          cp -a "$BUILDROOT"/. "$PAYLOAD"/

          sed "s/^Version:.*/Version:        ${RPM_VERSION}/" dist/cmux.spec > "$TOPDIR/SPECS/cmux.spec"

          rpmbuild -bb \
            --define "_topdir $TOPDIR" \
            --define "_builddir $PWD" \
            --define "_build_id_links none" \
            --define "debug_package %{nil}" \
            --define "_enable_debug_packages 0" \
            --noclean \
            --nodeps \
            --with prebuilt \
            --without webkit \
            "$TOPDIR/SPECS/cmux.spec"

          RPM=$(find "$TOPDIR/RPMS" -name '*.rpm' | head -1)
          cp "$RPM" .
          RPM_NAME=$(basename "$RPM")
          echo "Built: $RPM_NAME ($(du -h "$RPM_NAME" | cut -f1))"

      - name: Sign RPM with GPG
        env:
          REQUIRE_LINUX_GPG: "1"
          LINUX_GPG_PRIVATE_KEY_BASE64: ${{ secrets.LINUX_GPG_PRIVATE_KEY_BASE64 }}
          LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
          LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
        run: |
          bash scripts/sign-linux-packages.sh
          bash scripts/assert-linux-package-signatures.sh

      - name: Upload Rocky RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmux-linux-rpm-rocky-${{ matrix.arch.rpm }}
          path: |
            cmux-*.${{ matrix.arch.rpm }}.rpm
            cmux-*.${{ matrix.arch.rpm }}.rpm.asc
          if-no-files-found: error

  validate-distro-install:
    name: Validate Linux packages in distro VMs
    needs: [build-deb, build-rpm, build-rpm-rocky]
    runs-on: [self-hosted, linux, kvm, cmux-distro-test]
    environment: distro-tests
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Strip non-version tags from ghostty
        run: git -C ghostty tag -l 'xcframework-*' | xargs git -C ghostty tag -d 2>/dev/null || true

      - name: Download Linux package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate local release artifact override manifest
        run: |
          set -euo pipefail

          # The honey KVM runner is x86_64 — filter the multi-arch artifact
          # set down to the amd64/x86_64 packages for distro validation.
          # aarch64 distro tests are tracked separately (TIN-176 follow-up:
          # need an arm64 KVM runner before aarch64 distro tests can run).
          mapfile -t DEB_PATHS < <(find release-artifacts -type f -name 'cmux_*_amd64.deb' | sort)
          mapfile -t FEDORA_RPM_PATHS < <(find release-artifacts -type f -name 'cmux-*.fc42.x86_64.rpm' | sort)
          mapfile -t ROCKY_RPM_PATHS < <(find release-artifacts -type f -name 'cmux-*.el10*.x86_64.rpm' | sort)

          if [ "${#DEB_PATHS[@]}" -ne 1 ]; then
            echo "ERROR: expected exactly one amd64 DEB artifact, found ${#DEB_PATHS[@]}"
            printf '%s\n' "${DEB_PATHS[@]}"
            exit 1
          fi

          if [ "${#FEDORA_RPM_PATHS[@]}" -ne 1 ]; then
            echo "ERROR: expected exactly one Fedora x86_64 RPM artifact, found ${#FEDORA_RPM_PATHS[@]}"
            printf '%s\n' "${FEDORA_RPM_PATHS[@]}"
            exit 1
          fi

          if [ "${#ROCKY_RPM_PATHS[@]}" -ne 1 ]; then
            echo "ERROR: expected exactly one Rocky x86_64 RPM artifact, found ${#ROCKY_RPM_PATHS[@]}"
            printf '%s\n' "${ROCKY_RPM_PATHS[@]}"
            exit 1
          fi

          DEB_PATH="$(realpath "${DEB_PATHS[0]}")"
          FEDORA_RPM_PATH="$(realpath "${FEDORA_RPM_PATHS[0]}")"
          ROCKY_RPM_PATH="$(realpath "${ROCKY_RPM_PATHS[0]}")"
          DEB_NAME="$(basename "$DEB_PATH")"
          FEDORA_RPM_NAME="$(basename "$FEDORA_RPM_PATH")"
          ROCKY_RPM_NAME="$(basename "$ROCKY_RPM_PATH")"

          cat > nix/release-artifacts.override.nix <<EOF
          {
            assets = {
              deb = {
                name = "${DEB_NAME}";
                path = ${DEB_PATH};
              };
              rpm = {
                name = "${FEDORA_RPM_NAME}";
                path = ${FEDORA_RPM_PATH};
              };
              rpmFedora = {
                name = "${FEDORA_RPM_NAME}";
                path = ${FEDORA_RPM_PATH};
              };
              rpmRocky = {
                name = "${ROCKY_RPM_NAME}";
                path = ${ROCKY_RPM_PATH};
              };
            };
          }
          EOF

          echo "Generated local release-artifacts override:"
          cat nix/release-artifacts.override.nix

      - name: Configure self-hosted Nix
        run: bash scripts/configure-self-hosted-nix.sh

      - name: Verify runner Nix daemon
        run: |
          nix --version
          nix store info --store daemon

      - name: Verify KVM access
        run: |
          echo "=== KVM device ==="
          ls -la /dev/kvm
          test -c /dev/kvm || { echo "ERROR: /dev/kvm not found"; exit 1; }
          test -r /dev/kvm || { echo "ERROR: /dev/kvm not readable"; exit 1; }
          echo "=== QEMU version ==="
          if command -v qemu-system-x86_64 &>/dev/null; then
            qemu-system-x86_64 --version | head -1
          elif [ -x /usr/libexec/qemu-kvm ]; then
            /usr/libexec/qemu-kvm --version | head -1
          else
            echo "WARNING: no QEMU binary found in PATH (Nix provides it at build time)"
          fi

      - name: Fedora 42 package test
        run: bash scripts/run-distro-package-check.sh distro-fedora42

      - name: Rocky 10 package test
        run: bash scripts/run-distro-package-check.sh distro-rocky10

      - name: Debian 12 package test
        run: bash scripts/run-distro-package-check.sh distro-debian12

      - name: Ubuntu 24.04 package test
        run: bash scripts/run-distro-package-check.sh distro-ubuntu2404

      - name: Upload distro validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-distro-test-logs-${{ github.run_id }}
          path: |
            result/
            /tmp/distro-tests-*
          retention-days: 7
          if-no-files-found: ignore

  # ── Upload to GitHub release ─────────────────────────────────────
  release:
    name: Upload Linux packages to release
    needs: [build-deb, build-rpm, build-rpm-rocky, validate-distro-install]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.build-deb.outputs.tag }}"

          ASSETS=()
          # Each matrix leg uploads to its own arch-suffixed artifact dir
          # (e.g. cmux-linux-deb-amd64/, cmux-linux-rpm-aarch64/).
          # Detached GPG signatures (.asc) are uploaded alongside their package.
          for f in \
            cmux-linux-deb-*/*.deb cmux-linux-deb-*/*.deb.asc \
            cmux-linux-rpm-*/*.rpm cmux-linux-rpm-*/*.rpm.asc \
            cmux-linux-tarball-*/*.tar.gz cmux-linux-tarball-*/*.tar.gz.asc; do
            [ -f "$f" ] && ASSETS+=("$f")
          done

          echo "Uploading ${#ASSETS[@]} Linux assets for $TAG:"
          printf '  %s\n' "${ASSETS[@]}"

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "ERROR: No package artifacts found"
            ls -laR cmux-linux-*/ || true
            exit 1
          fi

          # Upload to existing release (created by fork-release.yml) or create new
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists, uploading Linux assets..."
            gh release upload "$TAG" "${ASSETS[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "Creating release $TAG with Linux assets..."
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "cmux $TAG" \
              --notes "Linux release packages for $TAG" \
              "${ASSETS[@]}"
          fi
