name: Fork Release (LAB)

on:
  push:
    tags:
      - 'lab-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. lab-v0.62.1)'
        required: true

concurrency:
  group: fork-release
  cancel-in-progress: false

jobs:
  build-macos:
    name: Build macOS .app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build GhosttyKit
        run: |
          cd ghostty
          zig build -Demit-xcframework=true -Dxcframework-target=universal -Doptimize=ReleaseFast

      - name: Build cmux LAB (Release)
        run: |
          xcodebuild -project GhosttyTabs.xcodeproj \
            -scheme cmux \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon-Fork \
            PRODUCT_NAME="cmux LAB" \
            PRODUCT_BUNDLE_IDENTIFIER=com.cmuxterm.app.lab \
            build

      - name: Package DMG
        run: |
          APP_PATH="build/Build/Products/Release/cmux LAB.app"
          npx create-dmg@8.0.0 "$APP_PATH" . --overwrite || true
          mv *.dmg cmux-lab-macos.dmg 2>/dev/null || mv "cmux LAB"*.dmg cmux-lab-macos.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmux-lab-macos
          path: cmux-lab-macos.dmg

  release:
    name: Create GitHub Release
    needs: [build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          [ -z "$TAG" ] && TAG="${{ github.event.inputs.tag }}"

          ASSETS=()
          for f in cmux-lab-macos/*.dmg; do
            [ -f "$f" ] && ASSETS+=("$f")
          done

          gh release upload "$TAG" "${ASSETS[@]}" --clobber 2>/dev/null || \
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "cmux LAB $TAG" \
            --notes "Fork release with FIDO2/WebAuthn enterprise auth support.

          ## Assets
          - **cmux-lab-macos.dmg** — macOS .app bundle (trans-themed LAB branding)

          ## Nix
          \`\`\`bash
          nix run github:Jesssullivan/cmux/$TAG
          \`\`\`
          " \
            "${ASSETS[@]}"
