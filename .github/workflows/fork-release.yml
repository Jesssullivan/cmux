name: Fork Release (LAB)

on:
  push:
    tags:
      - 'lab-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. lab-v0.62.1)'
        required: true

concurrency:
  group: fork-release
  cancel-in-progress: false

jobs:
  build-macos:
    name: Build macOS .app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: false

      - name: Download pre-built GhosttyKit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GHOSTTY_SHA=$(git -C ghostty rev-parse HEAD)
          TAG="xcframework-${GHOSTTY_SHA}"
          echo "Downloading GhosttyKit for ghostty commit ${GHOSTTY_SHA}"
          gh release download "$TAG" --repo manaflow-ai/ghostty --pattern "GhosttyKit.xcframework.tar.gz"
          tar xzf GhosttyKit.xcframework.tar.gz
          ls -la GhosttyKit.xcframework/

      - name: Build cmux LAB (Release)
        run: |
          xcodebuild -project GhosttyTabs.xcodeproj \
            -scheme cmux \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon-Fork \
            PRODUCT_BUNDLE_IDENTIFIER=com.cmuxterm.app.lab \
            build

      - name: Package DMG
        run: |
          APP_PATH="build/Build/Products/Release/cmux.app"
          npx create-dmg@8.0.0 "$APP_PATH" . --overwrite || true
          # Rename whatever DMG create-dmg produced
          for f in *.dmg; do
            [ -f "$f" ] && mv "$f" cmux-lab-macos.dmg && break
          done
          ls -lh cmux-lab-macos.dmg
          file cmux-lab-macos.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmux-lab-macos
          path: cmux-lab-macos.dmg

  release:
    name: Create GitHub Release
    needs: [build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          [ -z "$TAG" ] && TAG="${{ github.event.inputs.tag }}"

          ASSETS=()
          for f in cmux-lab-macos/*.dmg; do
            [ -f "$f" ] && ASSETS+=("$f")
          done

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "ERROR: No DMG artifacts found"
            ls -laR cmux-lab-macos/ || echo "artifact dir missing"
            exit 1
          fi

          NOTES="Fork release with FIDO2/WebAuthn enterprise auth support.

          ## Assets
          - **cmux-lab-macos.dmg** — macOS .app bundle (trans-themed LAB branding)

          ## Nix
          \`\`\`bash
          nix run github:Jesssullivan/cmux/\${TAG}
          \`\`\`"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists, uploading assets..."
            gh release upload "$TAG" "${ASSETS[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "cmux LAB $TAG" \
              --notes "$NOTES" \
              "${ASSETS[@]}"
          fi
