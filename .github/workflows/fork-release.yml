name: Fork Release (LAB)

on:
  push:
    tags:
      - 'lab-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. lab-v0.62.1)'
        required: true

concurrency:
  group: fork-release
  cancel-in-progress: false

jobs:
  build-macos:
    name: Build, sign, and package macOS .app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Strip non-version tags from ghostty
        run: git -C ghostty tag -l 'xcframework-*' | xargs git -C ghostty tag -d 2>/dev/null || true

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: false

      - name: Download pre-built GhosttyKit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GHOSTTY_SHA=$(git -C ghostty rev-parse HEAD)
          TAG="xcframework-${GHOSTTY_SHA}"
          echo "Downloading GhosttyKit for ghostty commit ${GHOSTTY_SHA}"
          gh release download "$TAG" --repo Jesssullivan/ghostty --pattern "GhosttyKit.xcframework.tar.gz"
          tar xzf GhosttyKit.xcframework.tar.gz
          ls -la GhosttyKit.xcframework/

      - name: Build libctap2
        run: |
          cd vendor/ctap2
          zig build -Doptimize=ReleaseFast
          cp zig-out/lib/libctap2.a ../../
          cp include/ctap2.h ../../

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: daemon/remote/go.mod

      - name: Build remote daemon binaries
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#lab-v}"
          ./scripts/build_remote_daemon_release_assets.sh \
            --version "$VERSION" \
            --release-tag "$TAG" \
            --repo "${{ github.repository }}" \
            --output-dir "remote-daemon-assets"

      - name: Build cmux LAB (Release)
        run: |
          xcodebuild -project GhosttyTabs.xcodeproj \
            -scheme cmux \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            ARCHS=arm64 \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon-Fork \
            PRODUCT_BUNDLE_IDENTIFIER=com.cmuxterm.app.lab \
            build

      - name: Import signing cert
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/cert.p12
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain
          rm -f /tmp/cert.p12

      - name: Codesign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="build/Build/Products/Release/cmux.app"
          ENTITLEMENTS="cmux.entitlements"
          EMBEDDED_ENTITLEMENTS="cmux.embedded.entitlements"
          CLI_PATH="$APP_PATH/Contents/Resources/bin/cmux"
          HELPER_PATH="$APP_PATH/Contents/Resources/bin/ghostty"
          # Deep-sign the bundle first, then narrow embedded executables, then
          # re-sign the top-level bundle to update the seal (re-signing nested
          # binaries invalidates the bundle's resource seal).
          /usr/bin/codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" --entitlements "$ENTITLEMENTS" --deep "$APP_PATH"
          if [ -f "$CLI_PATH" ]; then
            /usr/bin/codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" --entitlements "$EMBEDDED_ENTITLEMENTS" "$CLI_PATH"
          fi
          if [ -f "$HELPER_PATH" ]; then
            /usr/bin/codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" --entitlements "$EMBEDDED_ENTITLEMENTS" "$HELPER_PATH"
          fi
          # Re-sign top-level bundle (no --deep) to update seal after embedded re-signing
          /usr/bin/codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" --entitlements "$ENTITLEMENTS" "$APP_PATH"
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "Codesign verified"
          # Confirm team ID is embedded
          codesign -d --verbose=2 "$APP_PATH" 2>&1 | grep "TeamIdentifier"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="build/Build/Products/Release/cmux.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" cmux-notary.zip
          SUBMIT_JSON="$(xcrun notarytool submit cmux-notary.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait --output-format json)"
          SUBMIT_ID="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$SUBMIT_JSON")"
          STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$SUBMIT_JSON")"
          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed: $STATUS" >&2
            xcrun notarytool log "$SUBMIT_ID" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            exit 1
          fi
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          rm -f cmux-notary.zip
          echo "Notarization complete"

      - name: Package DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="build/Build/Products/Release/cmux.app"
          npx create-dmg@8.0.0 --identity="$APPLE_SIGNING_IDENTITY" "$APP_PATH" . --overwrite || true
          for f in *.dmg; do
            [ -f "$f" ] && mv "$f" cmux-lab-macos.dmg && break
          done
          ls -lh cmux-lab-macos.dmg
          file cmux-lab-macos.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmux-lab-macos
          path: cmux-lab-macos.dmg

      - name: Upload remote daemon artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cmux-lab-remote-daemon
          path: remote-daemon-assets/cmuxd-remote-*

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain >/dev/null 2>&1 || true

  release:
    name: Create GitHub Release
    needs: [build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          ASSETS=()
          for f in cmux-lab-macos/*.dmg; do
            [ -f "$f" ] && ASSETS+=("$f")
          done

          for f in cmux-lab-remote-daemon/cmuxd-remote-*; do
            [ -f "$f" ] && ASSETS+=("$f")
          done

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "ERROR: No DMG artifacts found"
            ls -laR cmux-lab-macos/ || echo "artifact dir missing"
            exit 1
          fi

          NOTES="Signed and notarized fork release with FIDO2/WebAuthn enterprise auth support.

          ## Assets
          - **cmux-lab-macos.dmg** — signed macOS .app (trans-themed LAB branding, Developer ID)
          - **cmuxd-remote-{darwin,linux}-{arm64,amd64}** — cross-platform remote daemon binaries

          ## Nix
          \`\`\`bash
          nix run github:Jesssullivan/cmux/\${TAG}
          \`\`\`"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists, uploading assets..."
            gh release upload "$TAG" "${ASSETS[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "cmux LAB $TAG" \
              --notes "$NOTES" \
              "${ASSETS[@]}"
          fi
