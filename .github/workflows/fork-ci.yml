name: Fork CI

on:
  push:
    branches: [main, 'sid/**']
  pull_request:
    branches: [main]

concurrency:
  group: fork-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS (LAB)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: false

      - name: Download pre-built GhosttyKit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GHOSTTY_SHA=$(git -C ghostty rev-parse HEAD)
          TAG="xcframework-${GHOSTTY_SHA}"
          echo "Downloading GhosttyKit for ghostty commit ${GHOSTTY_SHA}"
          gh release download "$TAG" --repo manaflow-ai/ghostty --pattern "GhosttyKit.xcframework.tar.gz" || {
            echo "Pre-built xcframework not found for $TAG"
            echo "Available releases:"
            gh release list --repo manaflow-ai/ghostty --limit 5
            exit 1
          }
          tar xzf GhosttyKit.xcframework.tar.gz
          ls -la GhosttyKit.xcframework/

      - name: Build libctap2
        run: |
          cd vendor/ctap2
          zig build -Doptimize=ReleaseFast
          cp zig-out/lib/libctap2.a ../../
          cp include/ctap2.h ../../

      - name: Run zig-ctap2 tests
        run: |
          cd vendor/ctap2
          zig build test
          zig build test-pbt

      - name: Build cmux LAB (Debug)
        run: |
          xcodebuild -project GhosttyTabs.xcodeproj \
            -scheme cmux \
            -configuration Debug \
            -destination 'platform=macOS' \
            ARCHS=arm64 \
            -derivedDataPath /tmp/cmux-fork-ci \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon-Fork \
            build

      - name: Build cmux LAB (Release)
        run: |
          xcodebuild -project GhosttyTabs.xcodeproj \
            -scheme cmux \
            -configuration Release \
            -destination 'platform=macOS' \
            ARCHS=arm64 \
            -derivedDataPath build \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon-Fork \
            build

  nix-check:
    name: Nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix flake check --print-build-logs
      - run: nix develop --command bash -c 'echo "zig $(zig version) — dev shell OK"'
