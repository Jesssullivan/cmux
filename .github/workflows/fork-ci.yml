name: Fork CI

on:
  push:
    branches: [main, 'sid/**']
  pull_request:
    branches: [main]

concurrency:
  group: fork-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS (LAB)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download pre-built GhosttyKit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GHOSTTY_SHA=$(git -C ghostty rev-parse HEAD)
          TAG="xcframework-${GHOSTTY_SHA}"
          echo "Downloading GhosttyKit for ghostty commit ${GHOSTTY_SHA}"
          gh release download "$TAG" --repo manaflow-ai/ghostty --pattern "GhosttyKit.xcframework.tar.gz" || {
            echo "Pre-built xcframework not found for $TAG"
            echo "Available releases:"
            gh release list --repo manaflow-ai/ghostty --limit 5
            exit 1
          }
          tar xzf GhosttyKit.xcframework.tar.gz
          ls -la GhosttyKit.xcframework/

      - name: Build cmux LAB (Debug)
        run: |
          xcodebuild -project GhosttyTabs.xcodeproj \
            -scheme cmux \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath /tmp/cmux-fork-ci \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon-Fork \
            PRODUCT_NAME="cmux LAB" \
            build

      - name: Build cmux LAB (Release)
        run: |
          xcodebuild -project GhosttyTabs.xcodeproj \
            -scheme cmux \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon-Fork \
            PRODUCT_NAME="cmux LAB" \
            build

  nix-check:
    name: Nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix flake check
      - run: nix develop --command echo "dev shell OK"
