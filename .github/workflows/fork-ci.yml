name: Fork CI

on:
  push:
    branches: [main, 'sid/**']
  pull_request:
    branches: [main]

concurrency:
  group: fork-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS (LAB)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: false

      - name: Build GhosttyKit
        run: |
          cd ghostty
          rm -rf zig-out
          zig build -Demit-xcframework=true -Demit-macos-app=false -Dxcframework-target=universal -Doptimize=ReleaseFast
          ls -la zig-out/lib/GhosttyKit.xcframework/

      - name: Link GhosttyKit xcframework
        run: ln -sfn ghostty/zig-out/lib/GhosttyKit.xcframework GhosttyKit.xcframework

      - name: Build cmux LAB (Debug)
        run: |
          xcodebuild -project GhosttyTabs.xcodeproj \
            -scheme cmux \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath /tmp/cmux-fork-ci \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon-Fork \
            PRODUCT_NAME="cmux LAB" \
            build

      - name: Build cmux LAB (Release)
        run: |
          xcodebuild -project GhosttyTabs.xcodeproj \
            -scheme cmux \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon-Fork \
            PRODUCT_NAME="cmux LAB" \
            build

  nix-check:
    name: Nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix flake check
      - run: nix develop --command echo "dev shell OK"
