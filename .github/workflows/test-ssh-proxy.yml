name: SSH Proxy E2E Tests (Self-Hosted)

# NOTE: Docker SSH tests require `cmux ssh` CLI subcommand which is
# macOS-only. On Linux, tests that need `cmux ssh` will SKIP gracefully.
# Tests that only use socket RPC will run on both platforms.

on:
  # SECURITY: Only trigger on direct pushes and manual dispatch.
  # Never run on pull_request — fork PRs could execute arbitrary code
  # on the self-hosted runner with Docker access.
  push:
    branches: [main, 'sid/**']
    paths:
      - 'tests_v2/test_ssh_remote_*.py'
      - 'tests/fixtures/ssh-remote/**'
      - 'daemon/remote/**'
      - 'cmux-linux/**'
      - 'ghostty'
      - '.github/workflows/test-ssh-proxy.yml'
      - 'scripts/run-ssh-proxy-tests.sh'
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or SHA to test
        required: false
        default: ""
      test_filter:
        description: "Test file glob (e.g., test_ssh_remote_docker_*.py)"
        required: false
        default: ""

concurrency:
  group: test-ssh-proxy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ssh-proxy-tests:
    name: SSH proxy e2e (honey)
    runs-on: [self-hosted, linux, gpu, cmux-test]
    environment: gpu-tests
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Strip non-version tags from ghostty
        run: git -C ghostty tag -l 'xcframework-*' | xargs git -C ghostty tag -d 2>/dev/null || true

      - name: Verify Docker
        run: |
          docker info --format "Docker {{.ServerVersion}}"
          docker ps --format "Running containers: {{.Names}}" || true

      - name: Configure self-hosted Nix
        run: bash scripts/configure-self-hosted-nix.sh

      - name: Build libghostty (Nix)
        run: |
          nix develop --command bash -c 'cd ghostty && zig build -Dapp-runtime=none -Drenderer=opengl -Doptimize=ReleaseFast'
          bash scripts/ghostty-compat-symlinks.sh
          ls -lh ghostty/zig-out/lib/libghostty.*

      - name: Build cmux-linux (Nix)
        run: nix develop --command bash -c 'cd cmux-linux && zig build -Doptimize=ReleaseFast && ls -lh zig-out/bin/cmux'

      - name: Run SSH proxy tests
        env:
          TEST_FILTER: ${{ inputs.test_filter || '' }}
        run: nix develop --command bash scripts/run-ssh-proxy-tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ssh-proxy-test-results-${{ github.run_id }}
          path: /tmp/ssh-proxy-tests-*
          retention-days: 7
          if-no-files-found: ignore
