app-id: com.jesssullivan.cmux
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: cmux

finish-args:
  # GPU rendering (OpenGL for libghostty)
  - --device=dri
  # PTY device access (terminal I/O)
  - --device=all
  # FIDO2/U2F hardware security keys (hidraw)
  - --device=hidraw
  # Windowing
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Network (for browser panels, WebAuthn)
  - --share=network
  # Home directory (config files, working directories)
  - --filesystem=home
  # Host commands (run user's shell, tools)
  - --talk-name=org.freedesktop.Flatpak
  # Notifications
  - --talk-name=org.freedesktop.Notifications
  # Secrets / keychain
  - --talk-name=org.freedesktop.secrets

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - '*.la'
  - '*.a'

modules:
  - dependencies.yml

  - name: cmux
    buildsystem: simple
    build-options:
      append-path: /app/zig
    build-commands:
      # Build libghostty (--system vendors pre-fetched Zig packages for offline build)
      - cd ghostty && zig build -Dapp-runtime=none -Drenderer=opengl -Doptimize=ReleaseFast -Dcpu=baseline -Dflatpak=true -Demit-docs=false --search-prefix /app --system $PWD/vendor/p
      # Build cmux-linux
      - cd cmux-linux && zig build -Doptimize=ReleaseFast -Dcpu=baseline
      # Install binary
      - install -Dm755 cmux-linux/zig-out/bin/cmux /app/bin/cmux
      # Install shared library
      - install -Dm755 ghostty/zig-out/lib/libghostty.so /app/lib/libghostty.so
      # Install desktop file
      - install -Dm644 dist/linux/com.jesssullivan.cmux.desktop /app/share/applications/com.jesssullivan.cmux.desktop
      # Install metainfo
      - install -Dm644 dist/linux/com.jesssullivan.cmux.metainfo.xml /app/share/metainfo/com.jesssullivan.cmux.metainfo.xml
      # Install icons
      - install -Dm644 dist/linux/icons/com.jesssullivan.cmux_16x16.png /app/share/icons/hicolor/16x16/apps/com.jesssullivan.cmux.png
      - install -Dm644 dist/linux/icons/com.jesssullivan.cmux_128x128.png /app/share/icons/hicolor/128x128/apps/com.jesssullivan.cmux.png
      - install -Dm644 dist/linux/icons/com.jesssullivan.cmux_256x256.png /app/share/icons/hicolor/256x256/apps/com.jesssullivan.cmux.png
      - install -Dm644 dist/linux/icons/com.jesssullivan.cmux_512x512.png /app/share/icons/hicolor/512x512/apps/com.jesssullivan.cmux.png
      # Install udev rules
      - install -Dm644 dist/linux/70-u2f.rules /app/share/udev/rules.d/70-u2f.rules
    sources:
      - type: dir
        path: ..
        skip:
          - flatpak/.flatpak-builder
          - flatpak/builddir
          - flatpak/repo
          - .zig-cache
          - zig-out
          - .build
          - node_modules
          - GhosttyKit.xcframework

      # Pre-fetched Zig packages for offline build (ghostty dependencies)
      - zig-packages.json
